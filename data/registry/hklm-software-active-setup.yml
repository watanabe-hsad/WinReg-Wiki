    path: docs/registry-tree/hklm/software/index.md
  - title: HKCU Software
    path: docs/registry-tree/hkcu/software/index.md
related_artifacts:
  - active-setup
tools:
  - Autoruns
  - Registry Explorer
  - RECmd
references:
