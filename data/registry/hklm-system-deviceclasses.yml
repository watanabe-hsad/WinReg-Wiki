    path: docs/registry-tree/hklm/system/controlset/enum/usb.md
  - title: USBSTOR
    path: docs/registry-tree/hklm/system/controlset/enum/usbstor.md
  - title: MountedDevices
    path: docs/registry-tree/hklm/system/mounteddevices.md
related_artifacts:
