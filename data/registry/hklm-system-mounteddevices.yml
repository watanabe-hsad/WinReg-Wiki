    path: docs/registry-tree/hklm/system/controlset/enum/usbstor.md
  - title: MountPoints2
    path: docs/registry-tree/hkcu/software/microsoft/windows/currentversion/mountpoints2.md
related_artifacts:
  - mounteddevices
  - usbstor
  - mountpoints2
tools:
  - Registry Explorer
  - RECmd
references:
