site_name: WinReg Wiki
site_description: Windows 注册表键值速查与取证线索
site_url: http://hsad.xyz/windows-registry-forensics-handbook/
repo_name: watanabe-hsad/WinReg-Wiki
repo_url: https://github.com/watanabe-hsad/WinReg-Wiki
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search:
      lang:
        - zh
        - en
  - tags

nav:
  - 首页: index.md
  - 注册表位置:
      - registry-tree/index.md
      - HKEY_CLASSES_ROOT:
          - registry-tree/hkcr/index.md
      - HKEY_CURRENT_USER:
          - registry-tree/hkcu/index.md
          - Environment: registry-tree/hkcu/environment.md
          - Printers: registry-tree/hkcu/printers.md
          - Software:
              - registry-tree/hkcu/software/index.md
              - Classes: registry-tree/hkcu/software/classes.md
              - Microsoft:
                  - Command Processor: registry-tree/hkcu/software/microsoft/command-processor.md
                  - Terminal Server Client: registry-tree/hkcu/software/microsoft/terminal-server-client.md
                  - Windows NT:
                      - CurrentVersion:
                          - AppCompatFlags: registry-tree/hkcu/software/microsoft/windows-nt/currentversion/appcompatflags.md
                  - Windows:
                      - CurrentVersion:
                          - Explorer: registry-tree/hkcu/software/microsoft/windows/currentversion/explorer.md
                          - Run / RunOnce: registry-tree/hkcu/software/microsoft/windows/currentversion/run.md
                          - UserAssist: registry-tree/hkcu/software/microsoft/windows/currentversion/userassist.md
                          - RunMRU: registry-tree/hkcu/software/microsoft/windows/currentversion/runmru.md
                          - RecentDocs: registry-tree/hkcu/software/microsoft/windows/currentversion/recentdocs.md
                          - ComDlg32: registry-tree/hkcu/software/microsoft/windows/currentversion/comdlg32.md
                          - MountPoints2: registry-tree/hkcu/software/microsoft/windows/currentversion/mountpoints2.md
                          - Internet Settings:
                              - registry-tree/hkcu/software/microsoft/windows/currentversion/internet-settings.md
                              - ZoneMap: registry-tree/hkcu/software/microsoft/windows/currentversion/internet-settings/zonemap.md
      - HKEY_LOCAL_MACHINE:
          - registry-tree/hklm/index.md
          - SAM: registry-tree/hklm/sam.md
          - SECURITY: registry-tree/hklm/security.md
          - SOFTWARE:
              - registry-tree/hklm/software/index.md
              - Classes: registry-tree/hklm/software/classes.md
              - Policies:
                  - registry-tree/hklm/software/policies.md
                  - Microsoft\Windows Defender: registry-tree/hklm/software/policies/microsoft/windows-defender.md
                  - Microsoft\WindowsFirewall: registry-tree/hklm/software/policies/microsoft/windowsfirewall.md
              - WOW6432Node: registry-tree/hklm/software/wow6432node.md
              - Microsoft:
                  - Active Setup: registry-tree/hklm/software/microsoft/active-setup.md
                  - Command Processor: registry-tree/hklm/software/microsoft/command-processor.md
                  - Windows NT:
                      - CurrentVersion:
                          - AeDebug: registry-tree/hklm/software/microsoft/windows-nt/currentversion/aedebug.md
                          - EMDMgmt: registry-tree/hklm/software/microsoft/windows-nt/currentversion/emdmgmt.md
                          - NetworkList\Profiles: registry-tree/hklm/software/microsoft/windows-nt/currentversion/networklist/profiles.md
                          - ProfileList: registry-tree/hklm/software/microsoft/windows-nt/currentversion/profilelist.md
                          - Winlogon: registry-tree/hklm/software/microsoft/windows-nt/currentversion/winlogon.md
                          - Winlogon\Notify: registry-tree/hklm/software/microsoft/windows-nt/currentversion/winlogon/notify.md
                          - Image File Execution Options: registry-tree/hklm/software/microsoft/windows-nt/currentversion/ifeo.md
                          - Windows: registry-tree/hklm/software/microsoft/windows-nt/currentversion/appinit-dlls.md
                  - Windows:
                      - CurrentVersion:
                          - App Paths: registry-tree/hklm/software/microsoft/windows/currentversion/app-paths.md
                          - Authentication\LogonUI: registry-tree/hklm/software/microsoft/windows/currentversion/authentication/logonui.md
                          - Policies\System: registry-tree/hklm/software/microsoft/windows/currentversion/policies/system.md
                          - Run / RunOnce: registry-tree/hklm/software/microsoft/windows/currentversion/run.md
                          - Uninstall: registry-tree/hklm/software/microsoft/windows/currentversion/uninstall.md
                          - ShellServiceObjectDelayLoad: registry-tree/hklm/software/microsoft/windows/currentversion/shellserviceobjectdelayload.md
                  - Windows Defender: registry-tree/hklm/software/microsoft/windows-defender.md
                  - Windows Portable Devices: registry-tree/hklm/software/microsoft/windows-portable-devices.md
                  - Windows Search:
                      - VolumeInfoCache: registry-tree/hklm/software/microsoft/windows-search/volumeinfocache.md
          - SYSTEM:
              - registry-tree/hklm/system/index.md
              - Select: registry-tree/hklm/system/select.md
              - MountedDevices: registry-tree/hklm/system/mounteddevices.md
              - ControlSet00x:
                  - registry-tree/hklm/system/controlset/index.md
                  - Services:
                      - registry-tree/hklm/system/controlset/services/index.md
                      - Drivers: registry-tree/hklm/system/controlset/services/drivers.md
                      - EventLog: registry-tree/hklm/system/controlset/services/eventlog.md
                      - SharedAccess\FirewallPolicy: registry-tree/hklm/system/controlset/services/sharedaccess/firewallpolicy.md
                      - Tcpip:
                          - registry-tree/hklm/system/controlset/services/tcpip.md
                          - Parameters\Interfaces: registry-tree/hklm/system/controlset/services/tcpip/parameters/interfaces.md
                  - Enum:
                      - registry-tree/hklm/system/controlset/enum/index.md
                      - USBSTOR: registry-tree/hklm/system/controlset/enum/usbstor.md
                      - USB: registry-tree/hklm/system/controlset/enum/usb.md
                      - SWD\WPDBUSENUM: registry-tree/hklm/system/controlset/enum/swd-wpdbusenum.md
                  - Control:
                      - DeviceClasses: registry-tree/hklm/system/controlset/control/deviceclasses.md
                      - Terminal Server: registry-tree/hklm/system/controlset/control/terminal-server.md
                      - TimeZoneInformation: registry-tree/hklm/system/controlset/control/timezone.md
                      - ComputerName: registry-tree/hklm/system/controlset/control/computername.md
                      - Session Manager:
                          - registry-tree/hklm/system/controlset/control/session-manager/index.md
                          - AppCertDlls: registry-tree/hklm/system/controlset/control/session-manager/appcertdlls.md
                          - BootExecute: registry-tree/hklm/system/controlset/control/session-manager/bootexecute.md
                          - KnownDLLs: registry-tree/hklm/system/controlset/control/session-manager/knowndlls.md
                          - PendingFileRenameOperations: registry-tree/hklm/system/controlset/control/session-manager/pending-file-rename-operations.md
                          - Environment: registry-tree/hklm/system/controlset/control/session-manager/environment.md
                      - Print\Monitors: registry-tree/hklm/system/controlset/control/print-monitors.md
                      - Lsa:
                          - registry-tree/hklm/system/controlset/control/lsa/index.md
                          - Security Packages: registry-tree/hklm/system/controlset/control/lsa/security-packages.md
          - HARDWARE: registry-tree/hklm/hardware.md
          - BCD00000000: registry-tree/hklm/bcd.md
      - HKEY_USERS:
          - registry-tree/hku/index.md
          - .DEFAULT: registry-tree/hku/default.md
          - 服务账户 SID: registry-tree/hku/service-sids.md
          - SID 映射: registry-tree/hku/sid-mapping.md
          - NTUSER.DAT: registry-tree/hku/ntuser.md
          - UsrClass.dat: registry-tree/hku/usrclass.md
      - HKEY_CURRENT_CONFIG:
          - registry-tree/hkcc/index.md
  - 取证场景:
      - questions/index.md
      - 常规注册表检查: questions/registry-checklist.md
      - 程序执行: questions/execution.md
      - Shell / Explorer 用户行为: questions/shell-explorer.md
      - 自启动与持久化: questions/persistence.md
      - USB 与外接设备: questions/usb.md
      - RDP 与远程访问: questions/rdp.md
      - 账户与安全: questions/accounts-security.md
      - 安全策略与防护配置: questions/policy-security.md
      - 网络与系统环境: questions/network.md
      - 软件安装与卸载: questions/software-install.md
      - 反取证与清理痕迹: questions/anti-forensics.md
      - Artifact 补充索引: artifacts/index.md
      - 结构化数据索引: artifacts/generated-index.md
      - 检测工程: detection/index.md
  - 贡献:
      - 页面模板: contributing/template.md
  - 标签: tags.md
